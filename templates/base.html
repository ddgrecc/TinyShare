<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TinyShare Admin{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header">📁 TinyShare</div>
        <ul class="nav-menu">
            <li><a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Dashboard</a></li>
            <li><a href="/shares" class="{% if request.url.path.startswith('/shares') %}active{% endif %}">Shares</a></li>
            <li><a href="/users" class="{% if request.url.path == '/users' %}active{% endif %}">Benutzer</a></li>
            <li><a href="/templates" class="{% if request.url.path.startswith('/templates') %}active{% endif %}">Vorlagen</a></li>
            <li><a href="/services" class="{% if request.url.path == '/services' %}active{% endif %}">Dienste</a></li>
        </ul>
    </nav>
    <main class="main-content">
        <header><h1>{% block header %}Übersicht{% endblock %}</h1></header>
        <section class="content">{% block content %}{% endblock %}</section>
    </main>
</body>
</html>
